{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-5 border-0">

            <h2 class="text-center mb-4">
                Login
            </h2>

            <form method = "POST">

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                        name = "email"
                        class="form-control"
                        placeholder="Enter your email">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                        name = "password"
                        class="form-control"
                        placeholder="Enter password">

                </div>


                <button class="btn btn-success w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
